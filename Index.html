<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rainy Days</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="background-image">
      <img
        class="background-foreground"
        src="/Images/Clouds foreground.png"
        alt=""
      />
      <img
        class="background-background"
        src="/Images/Clouds background.png"
        alt=""
      />
    </div>
    <main>
      <div class="title-wrapper">
        <h1 id="title">RAINY DAYS</h1>
        <a href="#shop">
          <img class="arrow-down" src="/Images/arrow-down-white.svg" alt=""
        /></a>

        <div class="mask">
          <video
            class="rain-video"
            src="/videos/rain.mp4"
            muted
            autoplay
            loop
          ></video>
        </div>
      </div>
      <div id="shop"></div>
    </main>
  </body>
</html>
